<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Wake</title>

<link rel="stylesheet" href="//cdn.jsdelivr.net/npm/docsify/lib/themes/vue.css">

<style>

body{
font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto;
background:#f5f7fb;
}

/* 内容区 */
.markdown-section{
max-width:900px;
margin:auto;
padding:20px;
}

/* 卡片 */
.card{
background:#fff;
padding:20px;
margin:20px 0;
border-radius:12px;
box-shadow:0 6px 20px rgba(0,0,0,0.06);
transition:0.3s;
}

.card:hover{
transform:translateY(-5px);
}

/* 标题 */
.card h3{
margin:0 0 10px;
}

/* 时间 */
.time{
color:#999;
font-size:14px;
}

/* 手机优化 */
@media (max-width:768px){
.markdown-section{
padding:15px;
}
}

/* 夜间模式 */
@media (prefers-color-scheme: dark){
body{
background:#1e1e1e;
}
.card{
background:#2c2c2c;
color:#ddd;
}
}

</style>

</head>

<body>

<div id="app">Loading...</div>

<script>

window.$docsify = {

name: 'Wake',

loadSidebar: true,
loadNavbar: true,

subMaxLevel: 2,

auto2top: true,

search: {
placeholder: '搜索',
noData: '找不到',
depth: 3
}

}

</script>

<script src="//cdn.jsdelivr.net/npm/docsify/lib/docsify.min.js"></script>
<script src="//cdn.jsdelivr.net/npm/docsify/lib/plugins/search.min.js"></script>

</body>
</html>
